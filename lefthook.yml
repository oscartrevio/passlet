# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  jobs:
    - name: biome
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-push:
  parallel: true
  skip:
    - merge
    - rebase
  jobs:
    - name: check-types
      run: pnpm check-types
    - name: test
      run: pnpm turbo test
